server.port=8080
spring.application.name=earnsafe-backend

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/earnsafe_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=EarnSafeSecretKeyForJWTTokenGeneration2024VeryLongSecretKey256Bits!!
jwt.expiration=86400000

# OpenWeather API
openweather.api.key=YOUR_OPENWEATHER_API_KEY
openweather.api.url=https://api.openweathermap.org/data/2.5

# AI Service
ai.service.url=http://localhost:8000

# Razorpay
razorpay.key.id=YOUR_RAZORPAY_KEY_ID
razorpay.key.secret=YOUR_RAZORPAY_KEY_SECRET

# Scheduler
spring.task.scheduling.pool.size=5

# Logging
logging.level.com.earnsafe=DEBUG
logging.level.org.springframework.security=DEBUG
